name: OpenRoot CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check structure
        run: |
          ls -la
          test -f README.md && echo "README OK" || echo "Missing README"
          test -d projects/aerocement && echo "AeroCement OK" || echo "Missing subdir"
